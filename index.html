<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Invest with Bjorn — Newsletter</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Georgia', serif;
      background: #f5f5f0;
      color: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .container {
      text-align: center;
      max-width: 520px;
      width: 90%;
      padding: 24px 16px;
    }

    .badge {
      display: inline-block;
      background: rgba(180, 140, 20, 0.1);
      border: 1px solid rgba(180, 140, 20, 0.35);
      color: #9a7a10;
      font-family: 'Arial', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      padding: 6px 16px;
      border-radius: 20px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: clamp(28px, 5vw, 42px);
      font-weight: normal;
      line-height: 1.2;
      color: #1a1a1a;
      margin-bottom: 12px;
      letter-spacing: -0.5px;
    }

    h1 span {
      color: #b8960c;
    }

    .banner {
      width: 100%;
      height: auto;
      border-radius: 10px;
      margin: 16px 0 20px;
      display: block;
    }

    p.subtitle {
      font-family: 'Arial', sans-serif;
      font-size: 15px;
      color: #666;
      line-height: 1.6;
      margin-bottom: 24px;
    }

    @media (max-width: 480px) {
      .badge {
        margin-bottom: 14px;
      }

      h1 {
        font-size: 26px;
        margin-bottom: 8px;
      }

      .banner {
        margin: 12px 0 14px;
        border-radius: 8px;
      }

      p.subtitle {
        font-size: 14px;
        margin-bottom: 20px;
      }

      p.subtitle br {
        display: none;
      }

      input {
        padding: 13px 16px;
        font-size: 16px; /* prevents iOS auto-zoom on focus */
      }

      button {
        padding: 14px;
        font-size: 16px;
      }
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    input {
      width: 100%;
      padding: 14px 18px;
      background: #ffffff;
      border: 1px solid #d0d0d0;
      border-radius: 8px;
      color: #1a1a1a;
      font-size: 15px;
      font-family: 'Arial', sans-serif;
      outline: none;
      transition: border-color 0.2s;
    }

    input::placeholder {
      color: #aaa;
    }

    input:focus {
      border-color: #b8960c;
    }

    button {
      width: 100%;
      padding: 15px;
      background: #b8960c;
      color: #ffffff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      font-family: 'Arial', sans-serif;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-top: 4px;
    }

    button:hover {
      background: #9a7a0a;
    }

    button:active {
      transform: scale(0.99);
    }

    button:disabled {
      background: #888;
      cursor: not-allowed;
    }

    .note {
      font-family: 'Arial', sans-serif;
      font-size: 12px;
      color: #aaa;
      margin-top: 16px;
    }

    /* Success state */
    .success-msg {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .success-msg .checkmark {
      width: 56px;
      height: 56px;
      background: rgba(184, 150, 12, 0.1);
      border: 2px solid #b8960c;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      margin-bottom: 4px;
    }

    .success-msg h2 {
      font-size: 22px;
      font-weight: normal;
      color: #1a1a1a;
    }

    .success-msg p {
      font-family: 'Arial', sans-serif;
      font-size: 14px;
      color: #666;
    }

    .field-error {
      font-family: 'Arial', sans-serif;
      font-size: 13px;
      color: #e57373;
      text-align: left;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">

    <div id="form-section">
      <div class="badge">Free Newsletter</div>
      <h1>Invest with <span>Bjorn</span></h1>
      <img src="bjorn banner.png" alt="Invest with Bjorn" class="banner" />
      <p class="subtitle">
        Investing insights, market breakdowns, and portfolio ideas —<br>
        straight to your inbox.
      </p>

      <iframe src="https://investwithbjorn.substack.com/embed" width="100%" height="150" style="border: none; background: transparent;" frameborder="0" scrolling="no"></iframe>
    </div>


  </div>

</body>
</html>
